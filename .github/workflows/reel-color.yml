# Color v2 del REEL: conform+color EN UNO desde los cortes HLG crudos (reel/hlg/) con la
# ingesta BT.2390 (motor_hdr) + textura del motor V3. Alineación por imagen contra la pieza
# aprobada (referencias_alineacion.npz). Al final regenera hook_alpha desde la pieza nueva.
# Salida: reel/crsrc/ + reel/fuentes/hook_alpha_color.webm
name: reel-color

on:
  workflow_dispatch:
    inputs:
      solo:
        description: "Opcional: nombre exacto de UNA pieza a re-colorear (rescate)"
        default: ""
      textura:
        description: "1 = BT.2390 + textura (aprobado), 0 = base pura"
        default: "1"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calc.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: calc
        env:
          SOLO: ${{ github.event.inputs.solo }}
        run: |
          if [ -n "$SOLO" ]; then
            M=$(jq -c --arg f "$SOLO" '[.[] | select(.file == $f)]' video/piezas_reel.json)
          else
            M=$(jq -c . video/piezas_reel.json)
          fi
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
          echo "$M" | jq length

  color:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        pieza: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python3 -m pip install --quiet numpy opencv-python-headless boto3
      - name: bajar corte HLG de R2
        working-directory: video
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          CORTE=$(echo "${{ matrix.pieza.file }}" | sed 's/\.mp4$/.mov/')
          python3 r2_util.py down "reel/hlg/$CORTE" "$CORTE"
      - name: conform + color (ingesta BT.2390 + textura V3)
        working-directory: video
        env:
          NPROC: "2"
          FF: "ffmpeg"
          FFP: "ffprobe"
          TEXTURA: ${{ github.event.inputs.textura }}
        run: |
          CORTE=$(echo "${{ matrix.pieza.file }}" | sed 's/\.mp4$/.mov/')
          python3 reel_color_driver2.py "$CORTE" "${{ matrix.pieza.file }}" "${{ matrix.pieza.frames }}" "c_${{ matrix.pieza.file }}"
      - name: subir coloreada a R2
        working-directory: video
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python3 r2_util.py up "c_${{ matrix.pieza.file }}" "reel/crsrc/${{ matrix.pieza.file }}"

  hook_alpha:
    needs: color
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: github.event.inputs.solo == ''
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python3 -m pip install --quiet numpy boto3 pillow
          python3 -m pip install --quiet torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: bajar pieza del hook COLOREADA
        working-directory: video
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python3 r2_util.py down "reel/crsrc/IMG_7747_4740_9040.mp4" hook_pieza.mp4
      - name: máscara de persona por frame -> webm alpha
        working-directory: video
        run: python3 reel_hook_alpha2.py hook_pieza.mp4 hook_alpha_color.webm
      - name: subir a R2
        working-directory: video
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python3 r2_util.py up hook_alpha_color.webm "reel/fuentes/hook_alpha_color.webm"
